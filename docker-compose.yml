version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:80"
    environment:
      - DATABASE_URL=postgres://bugam:bugam2026@postgres:5432/bugam
      - PORT=3001
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: bugam
      POSTGRES_PASSWORD: bugam2026
      POSTGRES_DB: bugam
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bugam"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: